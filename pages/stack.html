<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stack Page</title>
    <link rel="stylesheet" href="../global.css" />
    <link rel="stylesheet" href="stack.css" />
  </head>
  <body>
    <button class="btn" id="home">Home</button>

    <div class="stackContainer">
      
    
      <div id="userControls">

        <input type="number" class="userInput" id="Size" placeholder="Enter the max size: " />
        <input type="number" class="userInput" id="inputVal" placeholder="Enter value: " />
        
        <button class="op" id="push">Push</button>
        <button class="op" id="pop">Pop</button>
        <button class="op" id="top">Peek</button>
        <button class="op" id="re">Reset</button>
      </div>
      <div class="stack" id="stack">

      </div>

      <div class="message" id="message"></div>
    </div>
    <script src="stack.js"></script>
  </body>
</html>
